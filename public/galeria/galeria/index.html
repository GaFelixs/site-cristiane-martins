<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galeria | Login</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="login-page">

  <div class="login-container">
    <div class="login-brand">
      <span class="logo-name">Galeria</span>
      <span class="logo-tag">Fotografia</span>
    </div>

    <form class="login-form" id="loginForm">
      <h1 class="login-title">Acessar minha galeria</h1>

      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" placeholder="seu@email.com" required />
      </div>

      <div class="form-group">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="••••••••" required />
      </div>

      <p class="login-error" id="loginError"></p>

      <button type="submit" class="btn-primary" id="loginBtn">Entrar</button>
    </form>
  </div>

  <script src="assets/js/login.js"></script>
</body>
</html>

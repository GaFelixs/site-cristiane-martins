<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minha Galeria</title>
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body class="galeria-page">

  <header class="app-header">
    <div class="app-header__inner">
      <span class="logo-name">Galeria</span>
      <div class="app-header__right">
        <span id="nomeCliente" class="header-nome"></span>
        <span id="totalSelecionadas" class="badge-count">0 selecionadas</span>
        <button class="btn-logout" id="btnLogout">Sair</button>
      </div>
    </div>
  </header>

  <main class="galeria-main container">
    <div class="galeria-header">
      <h1>Suas fotos</h1>
      <p class="galeria-instrucao">Clique nas fotos que deseja selecionar para edição. Quando terminar, clique em <strong>Confirmar seleção</strong>.</p>
    </div>

    <div class="galeria-grid" id="galeriaGrid">
      <p class="loading-text">Carregando fotos...</p>
    </div>

    <div class="galeria-footer">
      <button class="btn-confirmar" id="btnConfirmar">
        ✓ Confirmar seleção (<span id="countConfirmar">0</span> fotos)
      </button>
    </div>
  </main>

  <!-- Modal de confirmação -->
  <div class="modal-overlay" id="modalConfirmar" style="display:none;">
    <div class="modal">
      <h2>Seleção confirmada!</h2>
      <p>Sua seleção foi salva com sucesso. A fotógrafa receberá a lista das fotos escolhidas.</p>
      <button class="btn-primary" id="btnFecharModal">OK</button>
    </div>
  </div>

  <script src="assets/js/galeria.js"></script>
</body>
</html>

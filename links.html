  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:    #c9a84c;
      --black:   #0a0a0a;
      --dark:    #111111;
      --dark-2:  #1a1a1a;
      --white:   #f5f5f0;
      --gray:    #888;
    }

    body {
      background: var(--black);
      color: var(--white);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    /* Fundo com gradiente sutil */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 50% 100%, rgba(201,168,76,.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    /* Avatar */
    .avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      overflow: hidden;
      border: 2px solid rgba(201,168,76,.5);
      box-shadow: 0 0 0 4px rgba(201,168,76,.12);
      margin-bottom: 4px;
    }
    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center top;
    }

    /* Nome e tag */
    .profile__name {
      font-family: 'Playfair Display', serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--white);
      text-align: center;
    }
    .profile__tag {
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--gold);
      text-align: center;
      margin-top: 2px;
    }
    .profile__bio {
      font-size: .85rem;
      color: rgba(255,255,255,.5);
      text-align: center;
      line-height: 1.6;
      margin-top: 4px;
      margin-bottom: 8px;
    }

    /* Divisor */
    .divider {
      width: 40px;
      height: 1px;
      background: rgba(201,168,76,.3);
    }

    /* Botões */
    .btn-link {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      width: 100%;
      padding: 16px 24px;
      border-radius: 14px;
      font-family: 'Inter', sans-serif;
      font-size: .95rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: transform .2s ease, box-shadow .2s ease, background .2s ease;
      letter-spacing: .02em;
    }
    .btn-link:hover {
      transform: translateY(-3px);
    }
    .btn-link:active {
      transform: translateY(0);
    }

    /* WhatsApp */
    .btn-whatsapp {
      background: #25d366;
      color: #fff;
      box-shadow: 0 4px 20px rgba(37,211,102,.3);
    }
    .btn-whatsapp:hover {
      background: #20bc5a;
      box-shadow: 0 8px 28px rgba(37,211,102,.45);
    }

    /* Site */
    .btn-site {
      background: var(--gold);
      color: var(--black);
      box-shadow: 0 4px 20px rgba(201,168,76,.3);
    }
    .btn-site:hover {
      background: #d9b85a;
      box-shadow: 0 8px 28px rgba(201,168,76,.45);
    }

    /* Instagram */
    .btn-instagram {
      background: var(--dark-2);
      color: var(--white);
      border: 1px solid rgba(201,168,76,.2);
      box-shadow: 0 4px 16px rgba(0,0,0,.3);
    }
    .btn-instagram:hover {
      background: #222;
      border-color: rgba(201,168,76,.4);
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
    }

    /* Ícones SVG */
    .btn-link svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    /* Rodapé */
    .footer {
      margin-top: 16px;
      font-size: .72rem;
      color: rgba(255,255,255,.2);
      text-align: center;
    }
    .footer a {
      color: rgba(201,168,76,.4);
      text-decoration: none;
    }
    .footer a:hover { color: var(--gold); }
  </style>
</head>
